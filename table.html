<!DOCTYPE html>
<html>
<head>
    <title>Table Dhibco</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        table{
            margin: 30px auto;
            border-collapse: collapse;
            width: 70%;
            background-color: white;
        }

        th, td{
            border: 1px solid black;
            padding: 10px;
        }

        th{
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even){
            background-color: #f9f9f9;
        }

        tr:hover{
            background-color: #ddd;
        }
    </style>
</head>
<body>

    <h2>Table-ka Dhibcaha Ardayga</h2>

    <table>
        <tr>
            <th>Mado</th>
            <th>Dhibco</th>
        </tr>

        <tr>
            <td>Math</td>
            <td>85</td>
        </tr>

        <tr>
            <td>English</td>
            <td>90</td>
        </tr>

        <tr>
            <td>Science</td>
            <td>88</td>
        </tr>

        <tr>
            <td>Computer</td>
            <td>95</td>
        </tr>
        <tr>
            <td>Tarabiyo</td>
            <td>78</td>
        </tr>

    </table>

</body>
</html>
